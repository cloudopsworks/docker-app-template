# README-TEMPLATE.yaml
# This file documents the docker-app-template for derived repositories.
# It is a reference guide — not runtime configuration. Derived repos should
# update README.md to describe the actual service and may keep or remove this file.

template:
  name: docker-app-template
  description: >
    Starter template for containerized services using the Cloud Ops Works GitHub Actions
    and deployment conventions. The primary artifact is a Docker image pushed to a
    container registry; deployment targets span AWS, Azure, and GCP.
  repository: https://github.com/cloudopsworks/docker-app-template

what_it_gives_you:
  - Container build pipeline with Docker image push to registry
  - Cloud Ops Works CI/CD configuration in .cloudopsworks/
  - GitHub Actions workflows in .github/workflows/ for PR builds, main builds, deploys, and cleanup
  - Deployment input samples for every supported target under .cloudopsworks/vars/
  - API Gateway sample definitions under apifiles/
  - Dual GitVersion presets (GitFlow and GitHub Flow) under .cloudopsworks/
  - Release and version helpers via Makefile

repository_layout:
  description: Top-level structure of a repository derived from this template.
  tree:
    .cloudopsworks/:
      _VERSION: Current template version (e.g. v5.x.y)
      cloudopsworks-ci.yaml: Main CI/CD configuration — branch protection, reviewers, zipGlobs, CD targets
      gitversion_gitflow.yaml: GitVersion preset for GitFlow branching strategy
      gitversion_githubflow.yaml: GitVersion preset for GitHub Flow branching strategy
      vars/:
        inputs-global.yaml: Shared settings used across all pipelines
        inputs-BEANSTALK-ENV.yaml: AWS Elastic Beanstalk deployment inputs
        inputs-LAMBDA-ENV.yaml: AWS Lambda deployment inputs
        inputs-KUBERNETES-ENV.yaml: Kubernetes / EKS / AKS / GKE deployment inputs
        inputs-DOCKER-ENV.yaml: Direct Docker / Kubernetes deployment inputs
        inputs-CLOUDRUN.yaml: Google Cloud Run deployment inputs
        inputs-APPENGINE.yaml: Google App Engine deployment inputs
    .github/workflows/:
      pr-build.yml: Pull-request validation build
      main-build.yml: Main/master branch build and image push
      deploy.yml: Deployment workflow dispatched per environment
      pr-close.yaml: Preview environment cleanup on PR close
    apifiles/: AWS API Gateway / OpenAPI definition samples
    Makefile: version and code/init targets powered by Tronador
    package.json: Package metadata — name and semver version (managed by make code/init)
    README.md: Service-specific description (replace this in derived repos)
    README-TEMPLATE.yaml: This file — template usage guide

quick_start:
  step_1_create_repo:
    description: Create a repository from this template using GitHub's "Use this template" flow.
    then: |
      git clone <your-new-repo-url>
      cd <your-new-repo>

  step_2_bootstrap_package_metadata:
    description: >
      Run make code/init to set package.json.name to @<github-owner>/<repo-name>
      and package.json.version from GitVersion's MajorMinorPatch.
    command: make code/init
    requires:
      - gitversion (installed by make automatically via Tronador)
      - gh CLI (authenticated)
      - yq

  step_3_set_application_metadata:
    description: >
      Update package.json with the real application name, description, scripts,
      and dependencies. Update README.md to describe the actual service.
    files_to_update:
      - package.json: name, description, scripts (build, test, start), dependencies
      - README.md: service description, architecture notes, runbook links

  step_4_choose_branching_model:
    description: >
      Copy the GitVersion preset that matches your branching strategy to the name
      expected by your downstream automation. See versioning section below.

  step_5_configure_cloudopsworks:
    description: >
      Configure .cloudopsworks/cloudopsworks-ci.yaml and the input files.
      See cloudopsworks_config and environment_inputs sections below.

versioning:
  description: >
    Two GitVersion presets are included. Choose one and copy it (or symlink it)
    to whatever path your automation expects (e.g. .cloudopsworks/gitversion.yaml).

  gitflow:
    file: .cloudopsworks/gitversion_gitflow.yaml
    use_when: >
      Your delivery process uses develop, feature/*, release/*, hotfix/*, support/* branches.
    branch_labels:
      develop: alpha (minor increment, continuous delivery)
      release: beta (minor increment, manual deployment)
      hotfix: beta (patch increment, manual deployment)
      main/master: "" (patch increment, production)
    example_copy: cp .cloudopsworks/gitversion_gitflow.yaml .cloudopsworks/gitversion.yaml

  github_flow:
    file: .cloudopsworks/gitversion_githubflow.yaml
    use_when: >
      Your delivery process centers on main/master, short-lived feature branches,
      pull requests, and optional release/* branches.
    branch_labels:
      main/master: "" (patch increment, production)
      release: beta (patch increment, manual deployment)
      feature: "{BranchName}" (inherit, manual deployment)
    example_copy: cp .cloudopsworks/gitversion_githubflow.yaml .cloudopsworks/gitversion.yaml

  local_version_helper:
    description: Write computed version to VERSION file and update package.json without tagging.
    command: make version

cloudopsworks_config:
  main_file: .cloudopsworks/cloudopsworks-ci.yaml
  description: Controls the CI/CD pipeline behavior for the repository.

  zipGlobs:
    description: >
      File patterns included and excluded from the build artifact zip.
      Update excludeGlobs if you add files that should not be packaged.

  config_section:
    branchProtection: Enable or disable GitHub branch protection rules
    gitFlow:
      enabled: Toggle GitFlow branch support in the pipeline
      supportBranches: Enable support/* long-lived branches
    requiredReviewers: Minimum number of approvals before merging to main/master
    reviewers: GitHub usernames or org/team slugs allowed to approve PRs
    owners: GitHub usernames or org/team slugs allowed to push to protected branches
    contributors:
      admin: Teams with admin access
      push: Teams with push access (e.g. cloudopsworks/engineering)

  cd_section:
    cloud: >
      Target cloud provider. One of: aws | azure | gcp | none
    cloud_type: >
      Deployment mechanism. One of:
      beanstalk | eks | lambda | aks | webapp | function | gke | appengine | cloudrun | kubernetes | none
    runner_set: >
      Optional: GitHub Actions runner label. Omit to use GitHub-hosted runners.

environment_inputs:
  description: >
    Per-environment configuration lives in .cloudopsworks/vars/.
    Start with inputs-global.yaml, then fill in the one target-specific file that matches
    your deployment mechanism. Leave all others as-is or delete them.

  global:
    file: .cloudopsworks/vars/inputs-global.yaml
    description: Shared settings used by all pipelines. Configure this first.
    required_fields:
      organization_name: Short org identifier (e.g. myorg)
      organization_unit: Business unit or team name
      environment_name: Logical environment label (dev, uat, prod, etc.)
      repository_owner: GitHub organization or user that owns this repo
      cloud: Target cloud (aws | azure | gcp | none)
      cloud_type: Deployment type matching the target (see cloudopsworks_config.cd_section)
    optional_security_scanning:
      snyk: Enable Snyk dependency scanning
      semgrep: Enable Semgrep SAST scanning
      trivy: Enable Trivy Docker image scanning
      sonarqube: Enable SonarQube code quality gate
    optional_integrations:
      jira: Ticket tracking integration
      dependencyTrack: Software bill of materials tracking
    optional_docker:
      docker_image: Base image override (default node:18-alpine)
      docker_inline: Inline Dockerfile content merged at build time
      docker_args: Build-time ARG values passed to Docker Build
      custom_run_command: Override the container startup command
      custom_usergroup: Custom user/group creation for slim base images
    optional_observability:
      agent: xray | newrelic | datadog | dynatrace
      config: Agent-specific tuning (sampling, tracing, tags, etc.)

  targets:
    beanstalk:
      file: .cloudopsworks/vars/inputs-BEANSTALK-ENV.yaml
      cloud: aws
      cloud_type: beanstalk
      required_fields:
        environment: Target environment label
        versions_bucket: S3 bucket for application version artifacts
        container_registry: ECR or other registry (required when preview is enabled)
        aws.region: AWS region for the Beanstalk environment
      optional_fields:
        aws.sts_role_arn: Shared IAM role for build and deploy
        aws.build_sts_role_arn: Separate IAM role for build phase
        aws.deploy_sts_role_arn: Separate IAM role for deploy phase
        logs_bucket: S3 bucket for environment logs
        blue_green: Set to true on prod environments to enable blue/green deployments
        dns: Route53 DNS alias configuration
        alarms: CloudWatch alarm thresholds and SNS topic

    lambda:
      file: .cloudopsworks/vars/inputs-LAMBDA-ENV.yaml
      cloud: aws
      cloud_type: lambda
      required_fields:
        environment: Target environment label
        versions_bucket: S3 bucket for Lambda deployment packages
        aws.region: AWS region
        lambda.arch: x86_64 | arm64
      optional_fields:
        container_registry: Required when deploying Lambda as a container image
        aws.sts_role_arn: Shared IAM role
        aws.build_sts_role_arn / deploy_sts_role_arn: Separate build/deploy roles
        lambda.iam: IAM execution role and policy attachments
        lambda.environment.variables: Runtime environment variables
        lambda.environment.secrets: Secrets Manager references injected as env vars
        lambda.vpc: VPC subnet and security group configuration
        lambda.triggers: Event source mappings (SQS, SNS, S3, API Gateway, EventBridge)
        lambda.schedules: EventBridge cron/rate schedules
        lambda.tracing: X-Ray tracing mode (Active | PassThrough)

    kubernetes:
      file: .cloudopsworks/vars/inputs-KUBERNETES-ENV.yaml
      cloud: aws | azure | gcp
      cloud_type: kubernetes | eks | aks | gke
      description: >
        Use for containerized workloads deployed via Helm to any Kubernetes cluster.
        Cloud-specific sections (aws, azure, gcp) are mutually exclusive — uncomment
        the block that matches your target cloud.
      required_fields:
        environment: Target environment label
        container_registry: Image registry (ECR, ACR, GCR, etc.)
        cluster_name: Kubernetes cluster name
        namespace: Target namespace
        helm_values_overrides: At minimum set image.repository to REGISTRY/REPOSITORY
      optional_fields:
        helm_repo_url: OCI or HTTPS Helm chart repository URL
        helm_chart_name: Chart name (if using remote chart)
        helm_chart_path: Local chart path (if chart is in-repo)
        secret_files: Mount secrets from a secrets manager as files
        config_map: Mount configmap files into the container
        docker_args: Docker build ARGs
        aws.secrets_path_filter: AWS Secrets Manager path prefix for External Secrets
        aws.external_secrets: Configure External Secrets Operator store
        aws.pod_identity: EKS Pod Identity IAM role binding
        azure.keyvault_name: Azure Key Vault name for secret injection
        azure.pod_identity: Azure Workload Identity binding
        gcp.secrets_path_filter: GCP Secret Manager path prefix for External Secrets
        gcp.pod_identity: GCP Workload Identity service account binding

    docker:
      file: .cloudopsworks/vars/inputs-DOCKER-ENV.yaml
      cloud: aws | azure | gcp
      cloud_type: kubernetes
      description: >
        Lighter Kubernetes variant without the Helm chart management overhead.
        Use when your deployment is purely Docker-image-driven with minimal Helm complexity.
      required_fields:
        environment: Target environment label
        container_registry: Image registry
        cluster_name: Kubernetes cluster name
        namespace: Target namespace

    cloudrun:
      file: .cloudopsworks/vars/inputs-CLOUDRUN.yaml
      cloud: gcp
      cloud_type: cloudrun
      required_fields:
        environment: Target environment label
        container_registry: GCR or Artifact Registry (always required for Cloud Run)
        gcp.region: GCP region
        gcp.project_id: GCP project ID
        cloudrun.type: service | job | worker_pool
      optional_fields:
        gcp.impersonate_sa: Service account email for unified build+deploy role
        gcp.build_impresonate_sa: Service account for build phase only
        gcp.deploy_impresonate_sa: Service account for deploy phase only
        cloudrun.ingress: all | internal | internal_lb (default all)
        cloudrun.limits: CPU and memory resource limits
        cloudrun.scaling: Min/max instances and scaling mode
        cloudrun.environment.variables: Runtime environment variables
        cloudrun.environment.secrets: GCP Secret Manager references
        cloudrun.ports: Port name (http1 | h2c) and number mappings
        cloudrun.vpc: VPC connector and egress settings
        cloudrun.volumes: Secret, GCS, NFS, CloudSQL, emptyDir volume mounts
        cloudrun.liveness_probe / readiness_probe / startup_probe: Health check probes
        cloudrun.triggers: Pub/Sub or Cloud Storage event triggers
        cloudrun.default_url_disabled: Disable the default *.run.app URL

    appengine:
      file: .cloudopsworks/vars/inputs-APPENGINE.yaml
      cloud: gcp
      cloud_type: appengine
      required_fields:
        environment: Target environment label
        versions_bucket: GCS bucket for App Engine version artifacts
        gcp.region: GCP region
        gcp.project_id: GCP project ID
        appengine.runtime: Runtime identifier (e.g. go122, python312, nodejs20)
        appengine.type: standard | flexible
        appengine.entrypoint_shell: Command App Engine uses to start the application
      optional_fields:
        container_registry: Required when preview environments are enabled
        gcp.impersonate_sa / build / deploy: Service account overrides
        appengine.iam.service_account: App Engine service account override
        appengine.instance.class: Instance class (B1..B8 for standard, F1..F4_1G for flexible)
        appengine.instance.auto_scaling: Min/max instances and CPU target
        dns: Cloud DNS alias configuration
        alarms: Stackdriver alarm thresholds and notification topic
        blue_green: Enable blue/green deployment on prod environments

docker_configuration:
  description: >
    Docker image build behavior is controlled from inputs-global.yaml.
    No Dockerfile is committed to the template — the pipeline generates one
    using the docker_image base and optional docker_inline content.
  options:
    docker_image:
      description: Base Docker image. Defaults to node:18-alpine if not set.
      example: "docker_image: node:20-alpine"
    docker_inline:
      description: >
        Raw Dockerfile instructions injected into the build stage.
        Use a multi-stage pattern: define a stage named 'customized' and the
        pipeline will COPY from it into the final image.
      example: |
        docker_inline: |
          FROM node:20-alpine as test
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci
          FROM customized
          COPY --from test /app/node_modules ./node_modules
    docker_args:
      description: Build-time ARG values passed with --build-arg.
      example: |
        docker_args: |
          NODE_ENV=production
          BUILD_VERSION=1.2.3
    custom_run_command:
      description: Overrides the default container CMD (npm run start).
      example: "custom_run_command: ./bin/my-service"
    custom_usergroup:
      description: >
        Shell commands to create a non-root user in the image.
        Needed for slim base images (Busybox, UBI-8/9, Fedora) that don't
        include useradd/groupadd by default.

api_definitions:
  description: >
    AWS API Gateway and OpenAPI specs live in apifiles/. Copy the closest sample,
    rename it for your service, and replace placeholder integrations and schemas.
  samples_included:
    - sample-http.yaml: HTTP API Gateway integration
    - sample-rest-custom-sqs.yaml: REST API with SQS backend
    - sample-rest-lambda.yaml: REST API with Lambda integration
    - sample-rest-vpc-link.yaml: REST API with VPC Link (internal ALB)
  to_enable: >
    Set api_files_dir in inputs-global.yaml (defaults to apifiles/) and
    enable API deployment in the CD section of cloudopsworks-ci.yaml.
  custom_path: >
    If your API specs live elsewhere, set:
    api_files_dir: "relative/path/to/apidefs"

github_actions:
  description: >
    Workflows under .github/workflows/ automate the full delivery surface.
    Do not edit all workflows at once — configure the Cloud Ops Works input files first;
    most workflow behavior is driven from those files.
  workflows:
    pr-build.yml:
      trigger: pull_request
      purpose: Lint, test, build, and security scan on every PR
      permissions: contents read, pull-requests write, issues write, checks write
    main-build.yml:
      trigger: push to main/master or develop
      purpose: Full build, Docker image push to registry, GitVersion tagging
      permissions: same as pr-build; security-events permission removed (managed externally)
    deploy.yml:
      trigger: workflow_dispatch (called by main-build or manually)
      purpose: Deploy the built image to the target environment
      cloud_credentials_injected:
        aws: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
        gcp: GOOGLE_CREDENTIALS
        azure: ARM_CLIENT_ID, ARM_CLIENT_SECRET
      note: >
        Credentials are scoped to the GitHub environment defined in the workflow.
        Ensure secrets are configured at the environment level, not repo-wide,
        to prevent leakage across environments.
    pr-close.yaml:
      trigger: pull_request closed
      purpose: Destroy preview environments for the closed PR
      supported_clouds: aws | azure | gcp
      note: >
        Uses ./bp/cd/deploy/preview/<cloud> actions for preview cleanup.
        Verify the blueprints reference matches your cloudopsworks-ci.yaml version.

onboarding_sequence:
  description: Recommended order of operations for a new derived repository.
  steps:
    1: Create a repository from this template using GitHub's "Use this template".
    2: Run make code/init to set the correct package name and version.
    3: Update package.json scripts and dependencies for the actual service.
    4: Choose a branching strategy and copy the matching GitVersion preset.
    5: Configure .cloudopsworks/cloudopsworks-ci.yaml — branch protection, reviewers, owners.
    6: Fill in .cloudopsworks/vars/inputs-global.yaml — org info, cloud target, security toggles.
    7: Fill in the one target-specific inputs-*.yaml file you will actually use.
    8: Add or replace API specs in apifiles/ if the service exposes APIs via the gateway flow.
    9: Update README.md to describe the actual service (architecture, runbook, owners).
    10: Open the first PR and validate CI/CD behavior end-to-end.

minimum_checklist:
  description: Gates before the first production release.
  items:
    - package.json name, description, scripts, and dependencies reflect the real service
    - one GitVersion strategy is selected and copied to the expected preset path
    - .cloudopsworks/cloudopsworks-ci.yaml matches branch protection and reviewer requirements
    - inputs-global.yaml placeholders (ORG_NAME, ORG_UNIT, ENV_NAME, REPO_OWNER) are replaced
    - cloud and cloud_type in inputs-global.yaml are set to real values (not the pipe-delimited list)
    - target-specific inputs-*.yaml placeholders (REGISTRY, CLUSTER_NAME, AWS_REGION, etc.) are replaced
    - unused deployment target files are clearly marked as templates or removed
    - GitHub environment secrets are configured for each deployment environment
    - README.md describes the actual service
    - CI passes on a pull request to main/master

maintainer_notes:
  description: Guidelines for maintainers of this template repository.
  guidance:
    - Keep README-TEMPLATE.yaml aligned with files that actually exist in the template.
    - Document new required placeholders or bootstrap steps when adding features.
    - Document changes to branching or versioning conventions.
    - Note whether downstream repos must manually copy, rename, or select new preset files.
    - When adding a new deployment target, add the Agents comment header to the inputs file
      (e.g. "# Agents: cloud=aws ; cloud_type=newtype") for tooling discoverability.
    - Prefer making runner_set optional (commented out) so GitHub-hosted runners work
      without any configuration in derived repos.
